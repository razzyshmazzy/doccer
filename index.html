<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doccer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=IBM+Plex+Mono:wght@400;500;600&display=swap" /></noscript>
    <!-- critical CSS — renders sign-in card immediately; rest loads async below -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
      [hidden]{display:none!important}
      :root{--bg:#0d0f12;--surface:#13161b;--surface-2:#1a1e25;--border:#262c38;--border-mid:#323a4a;--primary:#c84b1f;--text:#c8c4bc;--text-bright:#dedad2;--muted:#52596a;--muted-mid:#6e7888;--success:#4a8c5c;--radius:3px;--font:'IBM Plex Mono','Courier New',monospace;--font-display:'Share Tech Mono',monospace}
      body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
      .bg-video-wrap{position:fixed;inset:0;z-index:0;overflow:hidden}
      .screen{position:relative;z-index:1;display:flex;flex-direction:column;min-height:100vh}
      #signin-screen{align-items:center;justify-content:center;padding:24px}
      .center-card{background:rgba(19,22,27,.92);border:1px solid var(--border);border-radius:var(--radius);padding:48px 44px 44px;width:100%;max-width:420px;text-align:center}
      .logo{width:48px;height:48px;background:var(--surface-2);border:1px solid var(--border-mid);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
      .center-card h1{font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;color:var(--text-bright)}
      .subtitle{color:var(--muted-mid);font-size:12px;line-height:1.8;margin-bottom:24px}
      .features{list-style:none;text-align:left;margin-bottom:28px;display:flex;flex-direction:column;gap:10px;width:fit-content;margin-left:auto;margin-right:auto}
      .features li{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted-mid)}
      .indicator{width:5px;height:5px;border-radius:50%;background:var(--success);flex-shrink:0}
      .card-divider{height:1px;background:var(--border);margin:0 -44px 28px}
      .error-banner{background:rgba(184,48,48,.08);color:#c06060;border:1px solid rgba(184,48,48,.35);border-radius:var(--radius);padding:10px 14px;font-size:11px;margin-bottom:16px;text-align:left;letter-spacing:.04em}
      .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:var(--radius);font-size:11px;font-weight:500;cursor:pointer;border:none;text-decoration:none;font-family:var(--font);letter-spacing:.08em;text-transform:uppercase}
      .btn-google{background:var(--surface-2);color:var(--text);border:1px solid var(--border-mid);width:100%;justify-content:center;font-size:12px;padding:13px 20px}
      .btn-legal{background:#1a1e25;color:var(--muted-mid);border:1px solid var(--border);font-size:10px;padding:7px 14px;flex:1;justify-content:center}
      .legal-links{display:flex;gap:8px;margin-top:10px}
      @media(max-width:600px){.center-card{padding:36px 24px 32px}.card-divider{margin:0 -24px 24px}}
    </style>
    <!-- full stylesheet loads async — adds video bg, hover states, app screen, table, etc. -->
    <link rel="preload" href="styles.css" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="styles.css" /></noscript>
  </head>
  <body>
    <!-- background video -->
    <div class="bg-video-wrap" aria-hidden="true">
      <video class="bg-video" autoplay muted loop playsinline preload="none">
        <source src="bg.mp4" type="video/mp4" />
      </video>
      <div class="bg-overlay"></div>
      <div class="bg-blur"></div>
    </div>

    <!-- sign-in screen -->
    <div id="signin-screen" class="screen">
      <div class="center-card">
        <div class="logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="#c84b1f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="#c84b1f" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>

        <h1>Doccer</h1>

        <p class="subtitle">Losing access to an email?<br>Taking a trip down memory lane?</p>

        <ul class="features">
          <li>
            <span class="indicator"></span>
            Sort documents by creation date
          </li>
          <li>
            <span class="indicator"></span>
            Merge docs into a PDF
          </li>
          <li>
            <span class="indicator"></span>
            Download onto your computer!
          </li>
        </ul>

        <div class="card-divider"></div>

        <div id="auth-error" class="error-banner" hidden></div>

        <button id="signin-btn" class="btn btn-google">
          <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
            <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
            <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
            <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
            <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          </svg>
        </button>

        <div class="legal-links">
          <a href="privacy.html" class="btn btn-legal">Privacy Policy</a>
          <a href="terms.html" class="btn btn-legal">Terms of Service</a>
        </div>
      </div>
    </div>

    <!-- main app screen -->
    <div id="app-screen" class="screen" hidden>
      <header class="topbar">
        <div class="topbar-logo">
          <div class="topbar-logo-icon" aria-hidden="true">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M14 2v6h6M16 13H8M16 17H8" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          Doccer
        </div>
        <div class="topbar-right">
          <div class="user-chip">
            <div id="user-avatar" class="user-avatar"></div>
            <span id="user-email" class="user-email"></span>
          </div>
          <button id="signout-btn" class="btn btn-ghost">Sign out</button>
        </div>
      </header>

      <main class="main">
        <!-- loading state -->
        <div id="loading-state" class="state-block" hidden>
          <div class="loading-bar-wrap">
            <div class="loading-bar"></div>
          </div>
          <p id="loading-message">Fetching your Google Docs…</p>
        </div>

        <!-- error state -->
        <div id="error-state" class="state-block" hidden>
          <p class="error-text" id="error-message"></p>
          <button id="retry-btn" class="btn btn-primary">Retry</button>
        </div>

        <!-- empty state -->
        <div id="empty-state" class="state-block" hidden>
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="opacity:.2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <p class="muted">No documents found in drive.</p>
        </div>

        <!-- docs list -->
        <div id="docs-state" hidden>
          <div class="list-header">
            <div>
              <h2 id="docs-count"></h2>
              <p class="muted" id="docs-range"></p>
            </div>
            <button id="download-btn" class="btn btn-primary">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              Export PDF
            </button>
          </div>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th class="col-num">#</th>
                  <th>Title</th>
                  <th class="col-date">Created</th>
                </tr>
              </thead>
              <tbody id="docs-tbody"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- google identity services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- pdf-lib for native pdf merging -->
    <script src="https://cdn.jsdelivr.net/npm/pdf-lib@1.17.1/dist/pdf-lib.min.js" defer></script>
    <script src="script.js" defer></script>
  </body>
</html>
